name: Release (macOS artifacts)

# Builds macOS release artifacts (dmg + zip) for both arm64 and x64, then
# uploads them to the GitHub Release.
#
# Release modes:
#   - signed: Developer ID-signed, notarized, stapled. Requires all secrets below.
#   - unsigned-preview: ad-hoc signed preview artifacts. Used until Apple
#     Developer ID credentials are configured; GitHub marks these as prereleases
#     and the release body explains the Gatekeeper install workaround.
#
# This mirrors the LOCAL signing path (electron-builder.signed.cjs). The .app is
# signed by electron-builder (deep, Developer ID, hardened runtime) and notarized +
# stapled by the afterSign hook scripts/notarize.js (with Error-65 staple-retry);
# the DMGs are rebuilt via create-dmg and notarized + stapled by
# scripts/afterAllArtifactBuild.cjs (electron-builder's own DMG creation corrupts
# the embedded app signature). electron-builder builds the zip target only.
# The only difference vs local is credential delivery: locally we use the
# `openoffer-notary` keychain profile; in CI we use an App Store Connect API key
# (APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER), the recommended
# non-interactive path. Both built-in notarize and the DMG hook read those env vars.
#
# ── OPTIONAL REPOSITORY SECRETS FOR SIGNED RELEASES ────────────────────────
#   MACOS_CERT_P12_BASE64   base64 of the exported "Developer ID Application" .p12
#                           (export from Keychain Access; then `base64 -i cert.p12 | pbcopy`)
#   MACOS_CERT_PASSWORD     password set when exporting the .p12
#   KEYCHAIN_PASSWORD       any throwaway password for the temporary CI keychain
#   APPLE_API_KEY_P8_BASE64 base64 of the App Store Connect API key .p8 file
#   APPLE_API_KEY_ID        the key id (e.g. T9GPZ92M7K)
#   APPLE_API_ISSUER        the issuer UUID (App Store Connect → Users and Access → Integrations)
#
# Notes:
#   - We do NOT use the local `openoffer-notary` keychain profile in CI — that
#     profile only exists on the developer's machine. The api-key env vars
#     (APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER) are consumed by
#     electron-builder's built-in notarytool (app) and afterAllArtifactBuild.cjs (DMG).
#   - electron-builder imports the signing cert from CSC_LINK (the .p12) and
#     auto-discovers the Developer ID identity, so we do NOT set
#     NATIVELY_SIGN_IDENTITY here (the .signed.cjs config treats undefined as
#     "auto-discover").

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # manual trigger uses the branch/tag selected in the Actions UI

permissions:
  contents: write # needed to upload release assets

jobs:
  build-macos:
    runs-on: macos-14 # Apple Silicon runner; builds both arches via NATIVELY_BUILD_ALL_MAC_ARCHES
    timeout-minutes: 90
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Defaults to the triggering ref (tag on push, selected ref on dispatch).
          # No untrusted-input ref interpolation.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust (native module)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Resolve release mode
        id: release_mode
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          missing=()
          for name in MACOS_CERT_P12_BASE64 MACOS_CERT_PASSWORD KEYCHAIN_PASSWORD APPLE_API_KEY_P8_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -eq 0 ]; then
            test -f electron-builder.signed.cjs || {
              echo "electron-builder.signed.cjs is required for signed releases.";
              exit 1;
            }
            echo "OPENOFFER_RELEASE_MODE=signed" >> "$GITHUB_ENV"
            echo "OPENOFFER_RELEASE_PRERELEASE=false" >> "$GITHUB_ENV"
            echo "OPENOFFER_ARTIFACT_LABEL=signed-notarized" >> "$GITHUB_ENV"
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "artifact_label=signed-notarized" >> "$GITHUB_OUTPUT"
            echo "All signing/notarization secrets are configured; building signed release artifacts."
          else
            printf 'Missing signed-release secrets: %s\n' "${missing[*]}"
            echo "::warning::Building unsigned/ad-hoc macOS preview artifacts. The GitHub Release will be marked as a prerelease."
            echo "OPENOFFER_RELEASE_MODE=unsigned-preview" >> "$GITHUB_ENV"
            echo "OPENOFFER_RELEASE_PRERELEASE=true" >> "$GITHUB_ENV"
            echo "OPENOFFER_ARTIFACT_LABEL=unsigned-preview" >> "$GITHUB_ENV"
            echo "mode=unsigned-preview" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "artifact_label=unsigned-preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID signing certificate
        if: steps.release_mode.outputs.mode == 'signed'
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/openoffer-signing.keychain-db"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Make the temp keychain the default search list (+ keep login keychain).
          security list-keychains -d user -s "$KEYCHAIN_PATH" "login.keychain-db"
          echo "Imported identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          # Export CSC_LINK for electron-builder (it can also read the keychain directly,
          # but pointing it at the .p12 is the most deterministic path).
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$MACOS_CERT_PASSWORD" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key for notarytool
        if: steps.release_mode.outputs.mode == 'signed'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, staple
        if: steps.release_mode.outputs.mode == 'signed'
        env:
          # App Store Connect API-key strategy (consumed by notarize.js + afterAllArtifactBuild.cjs):
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        # Explicit stages (NOT `npm run dist:signed`): the dist:signed chain re-runs
        # `npm run build` (rimraf dist dist-electron) which can race electron-builder's
        # native rebuild and ENOENT on dist-electron at package time. Building the stages
        # first, then invoking electron-builder directly, is the reliable path.
        run: |
          set -euo pipefail
          # create-dmg is required by afterAllArtifactBuild.cjs (DMG rebuild) — install FIRST.
          which create-dmg >/dev/null 2>&1 || brew install create-dmg
          npm run build
          npm run typecheck:electron
          npm run build:electron
          NATIVELY_BUILD_ALL_MAC_ARCHES=1 npm run build:native
          node scripts/ensure-sharp-mac-deps.js
          ./node_modules/.bin/electron-builder --mac --config electron-builder.signed.cjs --publish never

      - name: Build unsigned macOS preview
        if: steps.release_mode.outputs.mode == 'unsigned-preview'
        run: |
          set -euo pipefail
          which create-dmg >/dev/null 2>&1 || brew install create-dmg
          npm run build
          npm run typecheck:electron
          npm run build:electron
          NATIVELY_BUILD_ALL_MAC_ARCHES=1 npm run build:native
          node scripts/ensure-sharp-mac-deps.js
          ./node_modules/.bin/electron-builder --mac --config electron-builder.preview.cjs --publish never
          node scripts/build-preview-dmgs.cjs

      - name: Verify signature + notarization (both arches + DMGs)
        if: steps.release_mode.outputs.mode == 'signed'
        run: |
          set -euo pipefail
          APPS=$(find release -maxdepth 2 -name 'OpenOffer.app' -path '*mac*')
          if [ -z "$APPS" ]; then echo "No OpenOffer.app found in release/"; exit 1; fi
          for APP in $APPS; do
            echo "::group::Verifying app: $APP"
            codesign -dv --verbose=4 "$APP" 2>&1 | sed -n '1,20p'
            codesign --verify --deep --strict --verbose=4 "$APP"
            spctl -a -vvv -t execute "$APP"          # expect: accepted / source=Notarized Developer ID
            xcrun stapler validate "$APP"
            echo "::endgroup::"
          done
          # DMGs are signed + notarized + stapled by scripts/afterAllArtifactBuild.cjs.
          shopt -s nullglob
          DMGS=(release/*.dmg)
          if [ ${#DMGS[@]} -eq 0 ]; then echo "No DMGs found in release/"; exit 1; fi
          for DMG in "${DMGS[@]}"; do
            echo "::group::Verifying dmg: $DMG"
            xcrun stapler validate "$DMG"            # hard requirement
            spctl -a -vvv -t open --context context:primary-signature "$DMG" || true  # informational
            echo "::endgroup::"
          done

      - name: Verify unsigned preview artifacts
        if: steps.release_mode.outputs.mode == 'unsigned-preview'
        run: |
          set -euo pipefail
          APPS=$(find release -maxdepth 2 -name 'OpenOffer.app' -path '*mac*')
          if [ -z "$APPS" ]; then echo "No OpenOffer.app found in release/"; exit 1; fi
          for APP in $APPS; do
            echo "::group::Verifying ad-hoc app signature: $APP"
            codesign -dv --verbose=4 "$APP" 2>&1 | sed -n '1,20p'
            codesign --verify --deep --strict --verbose=4 "$APP"
            echo "::warning::Unsigned preview artifacts are not notarized and are expected to fail Gatekeeper assessment."
            echo "::endgroup::"
          done

          shopt -s nullglob
          DMGS=(release/*.dmg)
          if [ ${#DMGS[@]} -eq 0 ]; then echo "No DMGs found in release/"; exit 1; fi

          verify_dmg() {
            local dmg="$1"
            local mount_output mount_point app_in_dmg
            echo "::group::Verifying unsigned dmg: $dmg"
            hdiutil verify "$dmg"
            mount_output=$(hdiutil attach "$dmg" -nobrowse -readonly -noverify)
            mount_point=$(printf '%s\n' "$mount_output" | awk '/\/Volumes\// { print substr($0, index($0, "/Volumes/")); exit }')
            if [ -z "$mount_point" ]; then
              echo "Could not resolve mount point for $dmg"
              printf '%s\n' "$mount_output"
              exit 1
            fi
            app_in_dmg=$(find "$mount_point" -maxdepth 1 -name '*.app' -print -quit)
            if [ -z "$app_in_dmg" ]; then
              hdiutil detach "$mount_point"
              echo "No .app found inside $dmg"
              exit 1
            fi
            codesign --verify --deep --strict --verbose=4 "$app_in_dmg"
            hdiutil detach "$mount_point"
            echo "::endgroup::"
          }

          for DMG in "${DMGS[@]}"; do
            verify_dmg "$DMG"
          done

      - name: Prepare release assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          rm -rf release-artifacts
          mkdir -p release-artifacts

          DMGS=(release/*.dmg)
          ZIPS=(release/*.zip)
          LATEST=(release/latest-mac.yml)
          BLOCKMAPS=(release/*.blockmap)

          if [ ${#DMGS[@]} -eq 0 ]; then echo "No DMG assets found in release/"; exit 1; fi
          if [ ${#ZIPS[@]} -eq 0 ]; then echo "No ZIP assets found in release/"; exit 1; fi
          if [ ${#LATEST[@]} -eq 0 ]; then echo "release/latest-mac.yml was not produced"; exit 1; fi

          ASSETS=("${DMGS[@]}" "${ZIPS[@]}" "${LATEST[@]}")
          if [ ${#BLOCKMAPS[@]} -gt 0 ]; then
            ASSETS+=("${BLOCKMAPS[@]}")
          fi
          : > release/SHA256SUMS.txt
          for ASSET in "${ASSETS[@]}"; do
            HASH=$(shasum -a 256 "$ASSET" | awk '{print $1}')
            printf '%s  %s\n' "$HASH" "$(basename "$ASSET")" >> release/SHA256SUMS.txt
            cp "$ASSET" release-artifacts/
          done
          cp release/SHA256SUMS.txt release-artifacts/

          NOTE_PATH=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTE_PATH" ]; then
            cp "$NOTE_PATH" release/RELEASE_BODY.md
          else
            {
              echo "## OpenOffer ${GITHUB_REF_NAME#v}"
              echo
              echo "See CHANGELOG.md for the user-visible changes in this release."
              echo
              echo "### Temporary macOS installation"
              echo
              echo 'Download `SHA256SUMS.txt` and verify the asset before opening it:'
              echo
              echo '```bash'
              echo 'FILE="OpenOffer-X.Y.Z-arm64.dmg" # or the asset you downloaded'
              echo 'grep "  $FILE$" SHA256SUMS.txt | shasum -a 256 -c -'
              echo '```'
              echo
              echo "Open the DMG, drag OpenOffer to Applications, then remove the quarantine flag if macOS blocks the unsigned preview build:"
              echo
              echo '```bash'
              echo 'xattr -dr com.apple.quarantine /Applications/OpenOffer.app'
              echo 'open /Applications/OpenOffer.app'
              echo '```'
            } > release/RELEASE_BODY.md
          fi

          if [ "${OPENOFFER_RELEASE_MODE:-}" = "unsigned-preview" ]; then
            cat > release/UNSIGNED_NOTICE.md <<'EOF'
          > [!WARNING]
          > This release contains unsigned/ad-hoc signed macOS preview artifacts. macOS will identify the app as coming from an unidentified developer until OpenOffer has Apple Developer ID signing and notarization configured. Verify checksums before installing, and use the temporary Gatekeeper workaround documented below only for artifacts downloaded from this GitHub Release.

          EOF
            cat release/UNSIGNED_NOTICE.md release/RELEASE_BODY.md > release/RELEASE_BODY.tmp
            mv release/RELEASE_BODY.tmp release/RELEASE_BODY.md
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openoffer-macos-${{ steps.release_mode.outputs.artifact_label }}
          path: |
            release-artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release/RELEASE_BODY.md
          fail_on_unmatched_files: true
          prerelease: ${{ steps.release_mode.outputs.prerelease == 'true' }}
          overwrite_files: true
          files: |
            release-artifacts/*
