name: Release (desktop artifacts)

# Builds desktop release artifacts on native runners, then publishes one GitHub
# Release containing all platform assets.
#
# Current release set:
#   - macOS: dmg + zip for arm64 and x64.
#   - Windows: unsigned x64 NSIS installer + portable exe.
#
# macOS release modes:
#   - signed: Developer ID-signed, notarized, stapled. Requires all Apple
#     secrets below.
#   - unsigned-preview: ad-hoc signed preview artifacts. Used until Apple
#     Developer ID credentials are configured; GitHub marks these as prereleases
#     and the release body explains the Gatekeeper install workaround.
#
# Windows artifacts are not Authenticode-signed yet, so SmartScreen warnings are
# expected. Keep Windows x64-only until the native module build produces every
# Windows arch packaged by Electron Builder.
#
# OPTIONAL REPOSITORY SECRETS FOR SIGNED macOS RELEASES
#   MACOS_CERT_P12_BASE64   base64 of the exported "Developer ID Application" .p12
#   MACOS_CERT_PASSWORD     password set when exporting the .p12
#   KEYCHAIN_PASSWORD       any throwaway password for the temporary CI keychain
#   APPLE_API_KEY_P8_BASE64 base64 of the App Store Connect API key .p8 file
#   APPLE_API_KEY_ID        the key id (e.g. T9GPZ92M7K)
#   APPLE_API_ISSUER        the issuer UUID (App Store Connect -> Users and Access -> Integrations)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 90
    outputs:
      mode: ${{ steps.release_mode.outputs.mode }}
      prerelease: ${{ steps.release_mode.outputs.prerelease }}
      artifact_label: ${{ steps.release_mode.outputs.artifact_label }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust (native module)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Resolve macOS release mode
        id: release_mode
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          missing=()
          for name in MACOS_CERT_P12_BASE64 MACOS_CERT_PASSWORD KEYCHAIN_PASSWORD APPLE_API_KEY_P8_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -eq 0 ]; then
            test -f electron-builder.signed.cjs || {
              echo "electron-builder.signed.cjs is required for signed releases.";
              exit 1;
            }
            echo "OPENOFFER_RELEASE_MODE=signed" >> "$GITHUB_ENV"
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "artifact_label=signed-notarized" >> "$GITHUB_OUTPUT"
            echo "All macOS signing/notarization secrets are configured; building signed release artifacts."
          else
            printf 'Missing signed-release secrets: %s\n' "${missing[*]}"
            echo "::warning::Building unsigned/ad-hoc macOS preview artifacts. The GitHub Release will be marked as a prerelease."
            echo "OPENOFFER_RELEASE_MODE=unsigned-preview" >> "$GITHUB_ENV"
            echo "mode=unsigned-preview" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "artifact_label=unsigned-preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID signing certificate
        if: steps.release_mode.outputs.mode == 'signed'
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/openoffer-signing.keychain-db"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "login.keychain-db"
          echo "Imported identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$MACOS_CERT_PASSWORD" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key for notarytool
        if: steps.release_mode.outputs.mode == 'signed'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, staple macOS
        if: steps.release_mode.outputs.mode == 'signed'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          which create-dmg >/dev/null 2>&1 || brew install create-dmg
          npm run build
          npm run typecheck:electron
          npm run build:electron
          NATIVELY_BUILD_ALL_MAC_ARCHES=1 npm run build:native
          node scripts/ensure-sharp-mac-deps.js
          ./node_modules/.bin/electron-builder --mac --config electron-builder.signed.cjs --publish never

      - name: Build unsigned macOS preview
        if: steps.release_mode.outputs.mode == 'unsigned-preview'
        run: |
          set -euo pipefail
          which create-dmg >/dev/null 2>&1 || brew install create-dmg
          npm run build
          npm run typecheck:electron
          npm run build:electron
          NATIVELY_BUILD_ALL_MAC_ARCHES=1 npm run build:native
          node scripts/ensure-sharp-mac-deps.js
          ./node_modules/.bin/electron-builder --mac --config electron-builder.preview.cjs --publish never
          node scripts/build-preview-dmgs.cjs

      - name: Verify signed macOS artifacts
        if: steps.release_mode.outputs.mode == 'signed'
        run: |
          set -euo pipefail
          APPS=$(find release -maxdepth 2 -name 'OpenOffer.app' -path '*mac*')
          if [ -z "$APPS" ]; then echo "No OpenOffer.app found in release/"; exit 1; fi
          for APP in $APPS; do
            echo "::group::Verifying app: $APP"
            codesign -dv --verbose=4 "$APP" 2>&1 | sed -n '1,20p'
            codesign --verify --deep --strict --verbose=4 "$APP"
            spctl -a -vvv -t execute "$APP"
            xcrun stapler validate "$APP"
            echo "::endgroup::"
          done
          shopt -s nullglob
          DMGS=(release/*.dmg)
          if [ ${#DMGS[@]} -eq 0 ]; then echo "No DMGs found in release/"; exit 1; fi
          for DMG in "${DMGS[@]}"; do
            echo "::group::Verifying dmg: $DMG"
            xcrun stapler validate "$DMG"
            spctl -a -vvv -t open --context context:primary-signature "$DMG" || true
            echo "::endgroup::"
          done

      - name: Verify unsigned macOS preview artifacts
        if: steps.release_mode.outputs.mode == 'unsigned-preview'
        run: |
          set -euo pipefail
          APPS=$(find release -maxdepth 2 -name 'OpenOffer.app' -path '*mac*')
          if [ -z "$APPS" ]; then echo "No OpenOffer.app found in release/"; exit 1; fi
          for APP in $APPS; do
            echo "::group::Verifying ad-hoc app signature: $APP"
            codesign -dv --verbose=4 "$APP" 2>&1 | sed -n '1,20p'
            codesign --verify --deep --strict --verbose=4 "$APP"
            echo "::warning::Unsigned preview artifacts are not notarized and are expected to fail Gatekeeper assessment."
            echo "::endgroup::"
          done

          shopt -s nullglob
          DMGS=(release/*.dmg)
          if [ ${#DMGS[@]} -eq 0 ]; then echo "No DMGs found in release/"; exit 1; fi

          verify_dmg() {
            local dmg="$1"
            local mount_output mount_point app_in_dmg
            echo "::group::Verifying unsigned dmg: $dmg"
            hdiutil verify "$dmg"
            mount_output=$(hdiutil attach "$dmg" -nobrowse -readonly -noverify)
            mount_point=$(printf '%s\n' "$mount_output" | awk '/\/Volumes\// { print substr($0, index($0, "/Volumes/")); exit }')
            if [ -z "$mount_point" ]; then
              echo "Could not resolve mount point for $dmg"
              printf '%s\n' "$mount_output"
              exit 1
            fi
            app_in_dmg=$(find "$mount_point" -maxdepth 1 -name '*.app' -print -quit)
            if [ -z "$app_in_dmg" ]; then
              hdiutil detach "$mount_point"
              echo "No .app found inside $dmg"
              exit 1
            fi
            codesign --verify --deep --strict --verbose=4 "$app_in_dmg"
            hdiutil detach "$mount_point"
            echo "::endgroup::"
          }

          for DMG in "${DMGS[@]}"; do
            verify_dmg "$DMG"
          done

      - name: Prepare macOS release assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          rm -rf release-artifacts-macos release-body
          mkdir -p release-artifacts-macos release-body

          DMGS=(release/*.dmg)
          ZIPS=(release/*.zip)
          BLOCKMAPS=(release/*.blockmap)

          if [ ${#DMGS[@]} -eq 0 ]; then echo "No DMG assets found in release/"; exit 1; fi
          if [ ${#ZIPS[@]} -eq 0 ]; then echo "No ZIP assets found in release/"; exit 1; fi
          if [ ! -f release/latest-mac.yml ]; then echo "release/latest-mac.yml was not produced"; exit 1; fi

          ASSETS=("${DMGS[@]}" "${ZIPS[@]}" release/latest-mac.yml)
          if [ ${#BLOCKMAPS[@]} -gt 0 ]; then
            ASSETS+=("${BLOCKMAPS[@]}")
          fi
          for ASSET in "${ASSETS[@]}"; do
            cp "$ASSET" release-artifacts-macos/
          done

          NOTE_PATH=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTE_PATH" ]; then
            cp "$NOTE_PATH" release-body/RELEASE_BODY.md
          else
            {
              echo "## OpenOffer ${GITHUB_REF_NAME#v}"
              echo
              echo "See CHANGELOG.md for the user-visible changes in this release."
              echo
              echo "### Downloads"
              echo
              echo "- macOS: download the DMG for your architecture."
              echo "- Windows: download the x64 setup or portable EXE."
              echo
              echo "Download \`SHA256SUMS.txt\` and verify the asset before opening it."
              echo
              echo "### Temporary macOS installation"
              echo
              echo "Open the DMG, drag OpenOffer to Applications, then remove the quarantine flag if macOS blocks the unsigned preview build:"
              echo
              echo '```bash'
              echo 'xattr -dr com.apple.quarantine /Applications/OpenOffer.app'
              echo 'open /Applications/OpenOffer.app'
              echo '```'
              echo
              echo "Windows artifacts are unsigned and may trigger SmartScreen until Authenticode signing is configured."
            } > release-body/RELEASE_BODY.md
          fi

          if [ "${OPENOFFER_RELEASE_MODE:-}" = "unsigned-preview" ]; then
            cat > release-body/UNSIGNED_NOTICE.md <<'EOF'
          > [!WARNING]
          > This release contains unsigned/ad-hoc signed macOS preview artifacts and unsigned Windows artifacts. macOS will identify the app as coming from an unidentified developer, and Windows SmartScreen may warn about an unknown publisher. Verify checksums before installing, and use the temporary Gatekeeper workaround documented below only for artifacts downloaded from this GitHub Release.

          EOF
            cat release-body/UNSIGNED_NOTICE.md release-body/RELEASE_BODY.md > release-body/RELEASE_BODY.tmp
            mv release-body/RELEASE_BODY.tmp release-body/RELEASE_BODY.md
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openoffer-macos-${{ steps.release_mode.outputs.artifact_label }}
          path: release-artifacts-macos/*
          if-no-files-found: error

      - name: Upload release body
        uses: actions/upload-artifact@v4
        with:
          name: openoffer-release-body
          path: release-body/RELEASE_BODY.md
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust (native module)
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64 preview
        run: npm run app:build:win

      - name: Prepare Windows release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-artifacts-windows | Out-Null

          if (-not (Test-Path -LiteralPath release)) {
            throw 'release/ was not produced'
          }
          if (-not (Test-Path -LiteralPath release/latest.yml)) {
            throw 'release/latest.yml was not produced'
          }

          $patterns = @('*.exe', 'latest.yml', '*.blockmap')
          $files = @()
          foreach ($pattern in $patterns) {
            $files += Get-ChildItem -Path release -Filter $pattern -File -ErrorAction SilentlyContinue
          }
          $files = $files | Sort-Object FullName -Unique
          $exeCount = ($files | Where-Object { $_.Extension -eq '.exe' }).Count
          if ($exeCount -eq 0) {
            throw 'No Windows .exe assets found in release/'
          }

          foreach ($file in $files) {
            Copy-Item -LiteralPath $file.FullName -Destination release-artifacts-windows
            Write-Host "Prepared Windows asset: $($file.Name)"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openoffer-windows-x64-unsigned
          path: release-artifacts-windows/*
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: openoffer-macos-${{ needs.build-macos.outputs.artifact_label }}
          path: release-artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: openoffer-windows-x64-unsigned
          path: release-artifacts

      - name: Download release body
        uses: actions/download-artifact@v4
        with:
          name: openoffer-release-body
          path: release-body

      - name: Generate combined checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          : > SHA256SUMS.txt
          while IFS= read -r -d '' ASSET; do
            HASH=$(sha256sum "$ASSET" | awk '{print $1}')
            printf '%s  %s\n' "$HASH" "$(basename "$ASSET")" >> SHA256SUMS.txt
          done < <(find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 | sort -z)
          cat SHA256SUMS.txt

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body/RELEASE_BODY.md
          fail_on_unmatched_files: true
          prerelease: ${{ needs.build-macos.outputs.prerelease == 'true' }}
          overwrite_files: true
          files: release-artifacts/*
