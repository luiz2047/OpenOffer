name: Feature request
description: Suggest an OpenOffer workflow improvement
title: "[Feature]: "
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        OpenOffer prioritizes local-first job-search, interview, recruiter-chat, meeting, and provider-setup workflows. Please describe the real workflow before proposing UI or implementation details.
  - type: textarea
    id: scenario
    attributes:
      label: User scenario
      description: What are you trying to do, and where does the current product break down?
      placeholder: "Example: I have three recruiter chats for the same company and want OpenOffer to merge them into one vacancy with stage history."
    validations:
      required: true
  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: What do you do manually today?
  - type: textarea
    id: sample
    attributes:
      label: Redacted sample input
      description: Optional. A short recruiter/vacancy/provider/setup sample helps, but remove personal data, secrets, and meeting links.
      placeholder: |
        Recruiter: ...
        Vacancy: ...
        Expected structured output: ...
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Recruiter chat to process
        - Vacancy/interview workspace
        - Local STT
        - Provider setup
        - Privacy/security
        - Packaging/release
        - Documentation/onboarding
        - Localization
        - Other
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy boundary
      description: Should this stay fully local, work with BYOK cloud providers, or both?
      placeholder: "Fully local preferred; cloud provider should be optional."
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, sketches, or related issues if useful.
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
