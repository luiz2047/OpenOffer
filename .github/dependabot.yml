version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /renderer
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      renderer-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /openoffer-browser
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      browser-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /native-module
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
